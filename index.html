<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Dashboard IVR — Consumo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#f4f1f2;--s1:#fff;--s2:#faf7f8;--s3:#f0eaeb;--bd:#e0d4d6;
  --green:#1a9e6a;--amber:#d97706;--red:#dc2626;--indigo:#6366f1;
  --txt:#1a0d0f;--muted:#8a6068;--dim:#e8dfe0;
  --f:'DM Sans',sans-serif;--fm:'DM Mono',monospace;
  --bur:#8b1c2a;--burl:#c42840;--burb:#e8304a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:var(--f);font-size:12px;height:100vh;display:flex;overflow:hidden}
.sidebar{width:190px;min-width:190px;background:var(--bur);display:flex;flex-direction:column;overflow-y:auto}
.sb-logo{padding:14px 14px 10px;font-size:13px;font-weight:600;color:#fff;border-bottom:1px solid rgba(255,255,255,.15)}
.sb-logo small{display:block;font-size:10px;font-weight:400;opacity:.6;margin-top:2px}
.sb-item{padding:9px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.1);border-left:3px solid transparent;transition:all .12s}
.sb-item:hover{background:rgba(255,255,255,.1)}
.sb-item.active{background:rgba(255,255,255,.18);border-left-color:#fff}
.sb-item.active .sb-name{color:#fff;font-weight:600}
.sb-name{font-size:12px;font-weight:500;display:flex;align-items:center;gap:7px;color:rgba(255,255,255,.85)}
.sb-val{font-size:10px;font-family:var(--fm);color:rgba(255,255,255,.55)}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--s1);border-bottom:2px solid var(--bur);padding:12px 20px;flex-shrink:0}
.topbar-row1{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.topbar-title{font-size:22px;font-weight:600;letter-spacing:-.02em}
.badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.06em}
.topbar-sub{font-size:12px;color:var(--muted)}
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.kpi{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:10px 14px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.g::before{background:var(--green)}.kpi.b::before{background:linear-gradient(90deg,var(--burl),var(--burb))}.kpi.a::before{background:var(--amber)}.kpi.r::before{background:var(--red)}.kpi.p::before{background:var(--indigo)}.kpi.t::before{background:#14b8a6}
.kpi-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.kpi-v{font-size:20px;font-weight:600;font-family:var(--fm);line-height:1}
.kpi-s{font-size:10px;color:var(--muted);margin-top:3px}
.content{flex:1;overflow:auto;padding:14px 20px}
.filter-panel{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:10px 14px;margin-bottom:12px}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:6px}
.filter-row:last-child{margin-bottom:0}
.filter-label{font-size:10px;color:var(--bur);font-weight:600;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;min-width:60px}
.chip{padding:3px 9px;border-radius:20px;border:1px solid var(--bd);background:none;color:var(--muted);font-size:10px;cursor:pointer;transition:all .12s;font-family:var(--f)}
.chip:hover{border-color:var(--burl);color:var(--burl)}
.chip.on{border-color:var(--burl);background:rgba(196,40,64,.1);color:var(--burl);font-weight:600}
.chip.reset{background:var(--s3)}
.tab-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:5px 14px;border-radius:20px;border:1px solid var(--bd);background:none;color:var(--muted);font-size:11px;cursor:pointer;font-family:var(--f);transition:all .12s;font-weight:500}
.tab.on{border-color:var(--burl);background:rgba(196,40,64,.12);color:var(--burl);font-weight:600}
.sec-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--bur);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--bur);opacity:.2}
.tbl-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.tbl-header .sec-label{flex:1;margin-right:10px;margin-bottom:0}
.tbl-header .sec-label::after{display:none}
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--bd);margin-bottom:16px}
table.res{width:100%;border-collapse:collapse;font-size:11px;white-space:nowrap}
table.res thead th{padding:7px 10px;text-align:right;font-size:10px;font-weight:500;color:var(--bur);text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(--bd);background:var(--s2)}
table.res thead th.tl{text-align:left;padding-left:14px}
table.res tbody tr{border-bottom:1px solid var(--bd);transition:background .1s}
table.res tbody tr:hover{background:var(--s2)}
table.res tbody tr.tot td{background:var(--s3);font-weight:600;border-top:2px solid var(--burl)}
table.res td{padding:7px 10px;text-align:right;font-family:var(--fm)}
table.res td.tl{text-align:left;font-family:var(--f);padding-left:14px}
.en{font-weight:600;font-size:12px}.es{font-size:10px;color:var(--muted);margin-top:1px}
.bc{display:flex;align-items:center;gap:6px;justify-content:flex-end}
.bb{width:60px;height:5px;background:var(--dim);border-radius:3px;overflow:hidden;flex-shrink:0}
.bf{height:100%;border-radius:3px}
.pct2{font-size:9px;color:var(--muted);margin-top:1px}
.ch-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.ch-row-1{display:grid;grid-template-columns:1fr;gap:14px;margin-bottom:16px}
.chb{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:12px}
.cht{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.xl-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:6px;border:1px solid rgba(139,28,42,.3);background:rgba(139,28,42,.06);color:var(--bur);font-size:10px;font-weight:600;cursor:pointer;font-family:var(--f);transition:all .12s}
.xl-btn:hover{background:rgba(139,28,42,.12);border-color:var(--bur)}
.hm-wrap{overflow-x:auto}
.hm-grid{display:inline-grid;gap:2px;padding:6px}
.hm-cell{width:36px;height:26px;display:inline-flex;align-items:center;justify-content:center;border-radius:3px;font-size:8px;font-family:var(--fm);cursor:default}
.hm-label{font-size:9px;color:var(--muted);font-family:var(--fm);display:flex;align-items:center;justify-content:flex-end;padding-right:4px}
.hm-hlabel{font-size:9px;color:var(--muted);font-family:var(--fm);text-align:center}
.legend-hm{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);margin-top:6px}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sb-logo">BML Collection<small>IVR — Consumo</small></div>
  <div id="sbItems"></div>
</div>
<div class="main">
  <div class="topbar">
    <div class="topbar-row1">
      <div class="topbar-title" id="mTitle">Consumo IVR</div>
      <span class="badge" id="mBadge"></span>
      <span class="topbar-sub" id="mSub"></span>
    </div>
    <div class="kpi-row">
      <div class="kpi b"><div class="kpi-l">IVRs Total</div><div class="kpi-v" id="kv-ivr">—</div><div class="kpi-s">llamadas generadas</div></div>
      <div class="kpi g"><div class="kpi-l">Casos Únicos Mes</div><div class="kpi-v" id="kv-casos" style="color:var(--green)">—</div><div class="kpi-s" id="kv-pcasos">—</div></div>
      <div class="kpi a"><div class="kpi-l">Teléfonos Únicos Mes</div><div class="kpi-v" id="kv-tels">—</div><div class="kpi-s" id="kv-ptels">—</div></div>
      <div class="kpi t"><div class="kpi-l">Casos c/ IVR</div><div class="kpi-v" id="kv-casosivr" style="color:#14b8a6">—</div><div class="kpi-s">ocurrencias totales</div></div>
      <div class="kpi p"><div class="kpi-l">Prom. IVR / Día</div><div class="kpi-v" id="kv-avgd" style="color:var(--indigo)">—</div><div class="kpi-s" id="kv-dias">—</div></div>
      <div class="kpi r"><div class="kpi-l">Prom. IVR / Hora</div><div class="kpi-v" id="kv-avgh">—</div><div class="kpi-s">horas activas</div></div>
    </div>
  </div>
  <div class="content">
    <div class="filter-panel" id="filter-panel">
      <div class="filter-row" id="fr-mes"><span class="filter-label">Mes</span></div>
      <div class="filter-row" id="fr-ent"><span class="filter-label">Entidad</span></div>
      <div class="filter-row" id="fr-prov"><span class="filter-label">Proveedor</span></div>
    </div>
    <div class="tab-bar">
      <span class="tab on"  id="tab-resumen"  onclick="setTab('resumen')">Resumen</span>
      <span class="tab"     id="tab-dia"      onclick="setTab('dia')">Por Día</span>
      <span class="tab"     id="tab-hora"     onclick="setTab('hora')">Por Hora</span>
      <span class="tab"     id="tab-heatmap"  onclick="setTab('heatmap')">Heatmap Día×Hora</span>
      <span class="tab"     id="tab-entidad"  onclick="setTab('entidad')">Por Entidad</span>
      <span class="tab"     id="tab-proveedor" onclick="setTab('proveedor')">Por Proveedor</span>
    </div>
    <div id="cnt"></div>
  </div>
</div>
<div id="csvToast" style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a9e6a;color:#fff;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:500;z-index:9999;display:none;box-shadow:0 4px 12px rgba(0,0,0,.15)"></div>

<script>
const CSV_URL='consumo_ivr.csv';
const ECOLS=['#c42840','#1a9e6a','#d97706','#6366f1','#0ea5e9','#f43f5e','#10b981','#f59e0b','#8b5cf6','#14b8a6','#ef4444','#22c55e','#eab308','#3b82f6','#ec4899','#64748b'];
const PCOLS={'GSM':'#c42840','MOVI':'#6366f1','Sin proveedor':'#94a3b8'};
const GSM_SUB_COLS=['#f43f5e','#d97706','#f59e0b','#10b981','#0ea5e9','#8b5cf6','#14b8a6','#22c55e','#eab308','#3b82f6','#ec4899','#ef4444'];
const tC='rgba(26,13,15,.5)',gC='rgba(26,13,15,.08)';
const HORAS=Array.from({length:16},(_,i)=>i+8);

let allRows=[],ENTS=[],MESES=[],PROVS=[];
let activeMeses=new Set(),activeEnts=new Set(),activeProvs=new Set();
let curEnt='ALL',activeTab='resumen',charts=[];

const fmt=n=>n==null?'—':parseInt(n).toLocaleString('es-AR');
const fmts=n=>n>=1e6?(n/1e6).toFixed(1)+'M':n>=1000?(n/1000).toFixed(0)+'k':String(Math.round(n));
const num=s=>parseInt(s)||0;
const pct=(a,b)=>b?((a/b)*100).toFixed(1)+'%':'—';

// ── CSV ──────────────────────────────────────────────────────────────────────
async function loadCSV(){
  const r=await fetch(CSV_URL);
  if(!r.ok) throw new Error('HTTP '+r.status);
  const txt=await r.text();
  const lines=txt.trim().split('\n');
  const headers=lines[0].split(',').map(h=>h.trim());
  allRows=lines.slice(1).filter(l=>l.trim()).map(l=>{
    const v=l.split(',');const o={};
    headers.forEach((h,i)=>o[h]=(v[i]||'').trim());
    return o;
  });
  MESES=[...new Set(allRows.map(r=>r.mes))].sort();
  ENTS=[...new Set(allRows.map(r=>r.entidad))].sort();
  PROVS=[...new Set(allRows.map(r=>r.proveedor))].sort();
  activeMeses=new Set(MESES);activeEnts=new Set(ENTS);activeProvs=new Set(PROVS);
  buildSidebar();buildFilters();sel('ALL');
  showToast('✓ Datos cargados');
}

function showToast(msg,err=false){
  const t=document.getElementById('csvToast');
  t.textContent=msg;t.style.background=err?'#dc2626':'#1a9e6a';t.style.display='block';
  setTimeout(()=>t.style.display='none',3000);
}

// ── SIDEBAR ──────────────────────────────────────────────────────────────────
function buildSidebar(){
  const sb=document.getElementById('sbItems');sb.innerHTML='';
  const all=document.createElement('div');all.className='sb-item';all.id='sb-ALL';
  const totAll=allRows.reduce((a,r)=>a+num(r.ivrs_total),0);
  all.innerHTML=`<span class="sb-name">Todas</span><span class="sb-val">${fmts(totAll)}</span>`;
  all.onclick=()=>sel('ALL');sb.appendChild(all);
  ENTS.forEach((e,i)=>{
    const tot=allRows.filter(r=>r.entidad===e).reduce((a,r)=>a+num(r.ivrs_total),0);
    const el=document.createElement('div');el.className='sb-item';el.id='sb-'+e;
    el.innerHTML=`<span class="sb-name"><span class="sb-dot" style="background:${ECOLS[i%ECOLS.length]}"></span>${e}</span><span class="sb-val">${fmts(tot)}</span>`;
    el.onclick=()=>sel(e);sb.appendChild(el);
  });
}

function sel(e){
  curEnt=e;
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('sb-'+e);if(el)el.classList.add('active');
  destroyCharts();render();
}

// ── FILTROS ──────────────────────────────────────────────────────────────────
function buildFilters(){
  // Meses
  const fm=document.getElementById('fr-mes');
  addChip(fm,'Todos','reset',()=>{activeMeses=new Set(MESES);syncChips('mes',activeMeses);render();});
  MESES.forEach(m=>{
    addChip(fm,m,'on',()=>{toggle(activeMeses,m);syncChips('mes',activeMeses);render();},m,'mes');
  });
  // Entidades
  const fe=document.getElementById('fr-ent');
  addChip(fe,'Todas','reset',()=>{activeEnts=new Set(ENTS);syncChips('ent',activeEnts);render();});
  ENTS.forEach((e,i)=>{
    const col=ECOLS[i%ECOLS.length];
    const b=addChip(fe,e,'on',()=>{toggle(activeEnts,e);syncChips('ent',activeEnts);render();},e,'ent');
    b.style.borderColor=col;b.style.color=col;b.style.background='rgba(0,0,0,.03)';b.dataset.color=col;
  });
  // Proveedores
  const fp=document.getElementById('fr-prov');
  addChip(fp,'Todos','reset',()=>{activeProvs=new Set(PROVS);syncChips('prov',activeProvs);render();});
  PROVS.forEach(p=>{
    addChip(fp,p,'on',()=>{toggle(activeProvs,p);syncChips('prov',activeProvs);render();},p,'prov');
  });
}

function addChip(container,text,cls,fn,val,group){
  const b=document.createElement('button');
  b.className='chip '+(cls==='on'?'on':'reset');
  b.textContent=text;b.onclick=fn;
  if(val)b.dataset.val=val;
  if(group)b.dataset.group=group;
  container.appendChild(b);return b;
}

function toggle(set,val){
  if(set.has(val)){if(set.size>1)set.delete(val);}else set.add(val);
}

function syncChips(group,set){
  document.querySelectorAll(`[data-group="${group}"]`).forEach(b=>{
    if(b.dataset.color){b.style.opacity=set.has(b.dataset.val)?'1':'0.3';}
    else{b.className=set.has(b.dataset.val)?'chip on':'chip';}
  });
}

function filteredRows(){
  let rows=allRows.filter(r=>activeMeses.has(r.mes)&&activeProvs.has(r.proveedor));
  if(curEnt!=='ALL') rows=rows.filter(r=>r.entidad===curEnt);
  else rows=rows.filter(r=>activeEnts.has(r.entidad));
  return rows;
}

// ── UNICOS (MAX por ent+prov+mes) ────────────────────────────────────────────
// Calcula casos_unicos y telefonos_unicos sumando el MAX por (ent,prov,mes)
// para el subconjunto de filas dado
function calcUnicos(rows){
  const mapC={},mapT={};
  rows.forEach(r=>{
    const k=r.entidad+'|'+r.proveedor+'|'+r.mes;
    const c=num(r.casos_unicos_mes), t=num(r.telefonos_unicos_mes);
    if(!(k in mapC)||c>mapC[k]) mapC[k]=c;
    if(!(k in mapT)||t>mapT[k]) mapT[k]=t;
  });
  return{
    casos: Object.values(mapC).reduce((a,v)=>a+v,0),
    tels:  Object.values(mapT).reduce((a,v)=>a+v,0)
  };
}

// ── AGGREGATE ────────────────────────────────────────────────────────────────
function aggRows(rows){
  const u=calcUnicos(rows);
  return{
    ivr:   rows.reduce((a,r)=>a+num(r.ivrs_total),0),
    casosIvr: rows.reduce((a,r)=>a+num(r.casos_con_ivr),0),
    telsIvr:  rows.reduce((a,r)=>a+num(r.telefonos_con_ivr),0),
    casosU: u.casos,
    telsU:  u.tels,
  };
}

function aggByKey(rows,keyFn){
  const map={};
  rows.forEach(r=>{
    const k=keyFn(r);
    if(!map[k])map[k]={_key:k,rows:[]};
    map[k].rows.push(r);
  });
  return Object.values(map).map(g=>({_key:g._key,...aggRows(g.rows)}));
}

// ── KPIs TOPBAR ──────────────────────────────────────────────────────────────
function updateKPIs(rows){
  const t=aggRows(rows);
  const dias=[...new Set(rows.map(r=>r.dia))].length;
  const horas=[...new Set(rows.map(r=>r.hora))].length;
  document.getElementById('mTitle').textContent=curEnt==='ALL'?'Consumo IVR':'Consumo IVR — '+curEnt;
  document.getElementById('mSub').textContent=`${activeMeses.size} mes${activeMeses.size>1?'es':''} · ${dias} días`;
  document.getElementById('mBadge').textContent=fmts(t.ivr)+' IVRs';
  document.getElementById('mBadge').style.cssText='background:rgba(139,28,42,.1);color:var(--bur);font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.06em';
  document.getElementById('kv-ivr').textContent=fmt(t.ivr);
  document.getElementById('kv-casos').textContent=fmt(t.casosU);
  document.getElementById('kv-pcasos').textContent='únicos en periodo';
  document.getElementById('kv-tels').textContent=fmt(t.telsU);
  document.getElementById('kv-ptels').textContent='únicos en periodo';
  document.getElementById('kv-casosivr').textContent=fmt(t.casosIvr);
  document.getElementById('kv-avgd').textContent=dias?fmts(Math.round(t.ivr/dias)):'—';
  document.getElementById('kv-dias').textContent=dias+' días activos';
  document.getElementById('kv-avgh').textContent=(dias&&horas)?fmts(Math.round(t.ivr/(dias*horas))):'—';
}

// ── TABS ─────────────────────────────────────────────────────────────────────
function setTab(tab){
  activeTab=tab;
  ['resumen','dia','hora','heatmap','entidad','proveedor'].forEach(t=>{
    document.getElementById('tab-'+t).className='tab'+(t===tab?' on':'');
  });
  destroyCharts();render();
}
function destroyCharts(){charts.forEach(c=>{try{c.destroy();}catch(x){}});charts=[];}

function render(){
  const rows=filteredRows();
  updateKPIs(rows);
  document.getElementById('fr-ent').style.display=curEnt==='ALL'?'':'none';
  if(activeTab==='resumen') renderResumen(rows);
  else if(activeTab==='dia') renderDia(rows);
  else if(activeTab==='hora') renderHora(rows);
  else if(activeTab==='heatmap') renderHeatmap(rows);
  else if(activeTab==='entidad') renderEntidad(rows);
  else if(activeTab==='proveedor') renderProveedor(rows);
}

// ── helpers HTML ─────────────────────────────────────────────────────────────
function barCell(v,max,col){
  const p=max?Math.round(v/max*100):0;
  return `<div class="bc"><div class="bb"><div class="bf" style="width:${p}%;background:${col}"></div></div></div>`;
}
function totRow(cells){return `<tr class="tot">${cells}</tr>`;}

// ── TAB: RESUMEN ─────────────────────────────────────────────────────────────
function renderResumen(rows){
  const byMes=aggByKey(rows,r=>r.mes).sort((a,b)=>a._key.localeCompare(b._key));
  const byEnt=aggByKey(rows,r=>r.entidad).sort((a,b)=>b.ivr-a.ivr);
  const totIvr=byEnt.reduce((a,d)=>a+d.ivr,0);
  const maxIvr=Math.max(...byEnt.map(d=>d.ivr));

  // Tabla meses
  let tMes=`<div class="tbl-header"><div class="sec-label">Por Mes</div></div>
  <div class="tbl-wrap"><table class="res"><thead><tr>
    <th class="tl">Mes</th><th>IVRs Total</th><th>Casos Únicos</th><th>Teléfonos Únicos</th><th>Casos c/ IVR</th><th>Días</th><th>IVR/Día</th>
  </tr></thead><tbody>`;
  let totM={ivr:0,casosU:0,telsU:0,casosIvr:0};
  byMes.forEach(d=>{
    const dias=[...new Set(rows.filter(r=>r.mes===d._key).map(r=>r.dia))].length;
    tMes+=`<tr><td class="tl"><div class="en">${d._key}</div></td>
      <td style="font-weight:600">${fmt(d.ivr)}</td>
      <td style="color:var(--green)">${fmt(d.casosU)}</td>
      <td style="color:var(--amber)">${fmt(d.telsU)}</td>

// ── TAB: HEATMAP ──────────────────────────────────────────────────────────────
function renderHeatmap(rows){
  const map={};
  rows.forEach(r=>{
    const k=r.dia+'_'+r.hora;
    if(!map[k])map[k]={ivr:0};
    map[k].ivr+=num(r.ivrs_total);
  });
  const dias=[...new Set(rows.map(r=>r.dia))].sort();
  const vals=dias.flatMap(d=>HORAS.map(h=>(map[d+'_'+h]||{ivr:0}).ivr));
  const maxV=Math.max(...vals);

  function hCol(v,max){
    if(!max||!v)return'rgba(148,163,184,.12)';
    const p=v/max;
    if(p<.25)return`rgba(99,102,241,${.15+p*.6})`;
    if(p<.5)return`rgba(196,40,64,${.3+p*.4})`;
    if(p<.75)return`rgba(139,28,42,${.5+p*.3})`;
    return`rgba(139,28,42,${.75+p*.25})`;
  }

  let g=`<div class="hm-wrap"><div class="hm-grid" style="grid-template-columns:72px repeat(${HORAS.length},36px)">`;
  g+=`<div class="hm-hlabel" style="text-align:left;font-size:10px;color:var(--bur);font-weight:600;padding-bottom:4px">Día \\ Hora</div>`;
  HORAS.forEach(h=>{g+=`<div class="hm-hlabel">${h}</div>`;});
  dias.forEach(d=>{
    g+=`<div class="hm-label">${d.slice(5)}</div>`;
    HORAS.forEach(h=>{
      const v=(map[d+'_'+h]||{ivr:0}).ivr;
      const col=hCol(v,maxV);
      const fg=v/maxV>.5?'#fff':'var(--muted)';
      g+=`<div class="hm-cell" style="background:${col};color:${fg}" title="${d} ${h}:00 → ${fmt(v)} IVRs">${v>0?fmts(v):''}</div>`;
    });
  });
  g+=`</div><div class="legend-hm"><span>Menos</span><div style="display:flex;gap:2px">`;
  [0,.25,.5,.75,1].forEach(p=>{g+=`<div style="width:28px;height:12px;border-radius:2px;background:${hCol(Math.round(p*maxV),maxV)}"></div>`;});
  g+=`</div><span>Más</span> <span style="color:var(--muted)">· máx: ${fmt(maxV)} IVRs</span></div></div>`;

  document.getElementById('cnt').innerHTML=`
    <div class="sec-label" style="margin-bottom:10px">Intensidad IVR — Día × Hora</div>
    <div class="chb" style="overflow-x:auto;margin-bottom:16px">${g}</div>`;
}

// ── TAB: POR PROVEEDOR ────────────────────────────────────────────────────────
function renderProveedor(rows){
  const byProv=aggByKey(rows,r=>r.proveedor).sort((a,b)=>b.ivr-a.ivr);
  const totIvr=byProv.reduce((a,d)=>a+d.ivr,0);
  const maxIvr=Math.max(...byProv.map(d=>d.ivr));

  // Separar GSM top-level y sub-proveedores
  const topProvs=byProv.filter(d=>d._key==='GSM'||d._key==='MOVI'||d._key==='Sin proveedor');
  const subProvs=byProv.filter(d=>d._key.startsWith('GSM_'));

  function provColor(p,i){
    if(p==='GSM')return'#c42840';
    if(p==='MOVI')return'#6366f1';
    if(p==='Sin proveedor')return'#94a3b8';
    return GSM_SUB_COLS[i%GSM_SUB_COLS.length];
  }

  // Tabla resumen
  let tProv=`<div class="tbl-header"><div class="sec-label">Resumen por Proveedor</div>
    <button class="xl-btn" onclick="exportXL('proveedor')">↓ Excel</button>
  </div>
  <div class="tbl-wrap"><table class="res"><thead><tr>
    <th class="tl">Proveedor</th><th>IVRs Total</th><th>% del Total</th><th>Casos Únicos</th><th>Teléfonos Únicos</th><th>Casos c/ IVR</th><th>Participación</th>
  </tr></thead><tbody>`;
  byProv.forEach((d,i)=>{
    const col=provColor(d._key,subProvs.indexOf(d));
    const p=totIvr?(d.ivr/totIvr*100).toFixed(1):0;
    const isSub=d._key.startsWith('GSM_');
    tProv+=`<tr><td class="tl"><div class="en" style="color:${col};${isSub?'padding-left:12px;font-size:11px;font-weight:500':''}">${isSub?'↳ ':''} ${d._key}</div></td>
      <td style="font-weight:600">${fmt(d.ivr)}</td><td>${p}%</td>
      <td style="color:var(--green)">${fmt(d.casosU)}</td>
      <td style="color:var(--amber)">${fmt(d.telsU)}</td>
      <td style="color:#14b8a6">${fmt(d.casosIvr)}</td>
      <td>${barCell(d.ivr,maxIvr,col)}</td>
    </tr>`;
  });
  tProv+=totRow(`<td class="tl">TOTAL</td><td>${fmt(totIvr)}</td><td>100%</td><td style="color:var(--green)">${fmt(byProv.reduce((a,d)=>a+d.casosU,0))}</td><td style="color:var(--amber)">${fmt(byProv.reduce((a,d)=>a+d.telsU,0))}</td><td style="color:#14b8a6">${fmt(byProv.reduce((a,d)=>a+d.casosIvr,0))}</td><td></td>`);
  tProv+='</tbody></table></div>';

  // Tabla proveedor × entidad
  const provList=byProv.map(d=>d._key);
  const entList=[...new Set(rows.map(r=>r.entidad))].sort();
  // Pivot
  const pivot={};
  entList.forEach(e=>{ pivot[e]={}; provList.forEach(p=>{ pivot[e][p]=0; }); });
  rows.forEach(r=>{ if(pivot[r.entidad]) pivot[r.entidad][r.proveedor]=(pivot[r.entidad][r.proveedor]||0)+num(r.ivrs_total); });
  const topPList=byProv.slice(0,8).map(d=>d._key); // top 8 para no desbordar tabla

  let tPivot=`<div class="tbl-header"><div class="sec-label">IVRs por Proveedor × Entidad (Top 8 proveedores)</div></div>
  <div class="tbl-wrap"><table class="res"><thead><tr>
    <th class="tl">Entidad</th>`;
  topPList.forEach((p,i)=>{ tPivot+=`<th style="color:${provColor(p,subProvs.findIndex(d=>d._key===p))}">${p}</th>`; });
  tPivot+=`<th>Total</th></tr></thead><tbody>`;
  const colTots={};topPList.forEach(p=>{colTots[p]=0;});let gTot=0;
  entList.forEach(e=>{
    const rowTot=topPList.reduce((a,p)=>a+(pivot[e][p]||0),0);if(!rowTot)return;
    tPivot+=`<tr><td class="tl"><div class="en" style="color:${ECOLS[ENTS.indexOf(e)%ECOLS.length]}">${e}</div></td>`;
    topPList.forEach(p=>{ tPivot+=`<td>${pivot[e][p]?fmts(pivot[e][p]):'—'}</td>`; colTots[p]+=(pivot[e][p]||0); });
    tPivot+=`<td style="font-weight:600">${fmts(rowTot)}</td></tr>`;gTot+=rowTot;
  });
  tPivot+=`<tr class="tot"><td class="tl">TOTAL</td>`;
  topPList.forEach(p=>{tPivot+=`<td>${fmts(colTots[p])}</td>`;});
  tPivot+=`<td>${fmts(gTot)}</td></tr></tbody></table></div>`;

  document.getElementById('cnt').innerHTML=tProv+tPivot+`
    <div class="ch-row">
      <div class="chb"><div class="cht">IVRs por Proveedor Principal</div><canvas id="ch-prov" height="190"></canvas></div>
      <div class="chb"><div class="cht">Sub-proveedores GSM</div><canvas id="ch-gsm" height="190"></canvas></div>
    </div>`;

  const cP=new Chart(document.getElementById('ch-prov'),{type:'bar',data:{
    labels:byProv.map(d=>d._key),
    datasets:[{label:'IVRs',data:byProv.map(d=>d.ivr),backgroundColor:byProv.map((d,i)=>provColor(d._key,subProvs.indexOf(d))),borderRadius:4}]
  },options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`IVRs: ${fmt(c.raw)}`}}},
    scales:{x:{ticks:{color:tC,font:{size:9},maxRotation:40},grid:{display:false}},y:{ticks:{color:tC,callback:v=>fmts(v)},grid:{color:gC}}}}});
  charts.push(cP);

  const gsmSubs=subProvs;
  const cG=new Chart(document.getElementById('ch-gsm'),{type:'doughnut',data:{
    labels:gsmSubs.map(d=>d._key),
    datasets:[{data:gsmSubs.map(d=>d.ivr),backgroundColor:gsmSubs.map((_,i)=>GSM_SUB_COLS[i%GSM_SUB_COLS.length]),borderWidth:1}]
  },options:{responsive:true,plugins:{legend:{labels:{color:tC,font:{size:9}},position:'right'},
    tooltip:{callbacks:{label:c=>`${c.label}: ${fmt(c.raw)}`}}}}});
  charts.push(cG);
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function exportXL(type){
  const rows=filteredRows();
  let data;
  if(type==='entidad'){
    data=aggByKey(rows,r=>r.entidad).sort((a,b)=>b.ivr-a.ivr).map(d=>({'Entidad':d._key,'IVRs Total':d.ivr,'Casos Únicos':d.casosU,'Tels Únicos':d.telsU,'Casos c/ IVR':d.casosIvr}));
  } else if(type==='dia'){
    data=aggByKey(rows,r=>r.dia).sort((a,b)=>a._key.localeCompare(b._key)).map(d=>({'Fecha':d._key,'IVRs Total':d.ivr,'Casos c/ IVR':d.casosIvr}));
  } else if(type==='hora'){
    data=aggByKey(rows,r=>r.hora).sort((a,b)=>parseInt(a._key)-parseInt(b._key)).map(d=>({'Hora':d._key+':00','IVRs Total':d.ivr,'Casos c/ IVR':d.casosIvr}));
  } else if(type==='proveedor'){
    data=aggByKey(rows,r=>r.proveedor).sort((a,b)=>b.ivr-a.ivr).map(d=>({'Proveedor':d._key,'IVRs Total':d.ivr,'Casos Únicos':d.casosU,'Tels Únicos':d.telsU,'Casos c/ IVR':d.casosIvr}));
  }
  const ws=XLSX.utils.json_to_sheet(data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Consumo IVR');
  XLSX.writeFile(wb,`consumo_ivr_${type}_${new Date().toISOString().slice(0,10)}.xlsx`);
}
